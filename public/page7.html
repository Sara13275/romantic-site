<!DOCTYPE html>
<html>
<head>
    <title>Will You Ever Leave Me? 💞</title>

<style>

/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    position:relative;
    background: url("https://png.pngtree.com/thumb_back/fh260/background/20240716/pngtree-red-heart-background-with-hearts-image_16007990.jpg") no-repeat center center/cover;
}

/* Dark overlay */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
}

/* ================= STRUCTURE ================= */

.container{
    position:relative;
    z-index:2;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.glass-box{
    background:rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    padding:50px 60px;
    border-radius:20px;
    color:white;
    max-width:800px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
    animation: fadeIn 1.5s ease forwards;
    position:relative;
    overflow-y:auto;
    max-height:85vh;
}

/* Corner heart */
.corner-heart{
    position:absolute;
    top:15px;
    right:20px;
    font-size:22px;
    animation: heartbeat 1.2s infinite;
}

/* Title */
.book-title{
    font-size:30px;
    margin-bottom:20px;
}

/* Text */
.romantic-text{
    font-size:20px;
    margin-bottom:30px;
}

/* ================= BUTTONS ================= */

.fun-buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.correct-btn, .maybe-btn{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.correct-btn{
    background:#ff4d6d;
    color:white;
}

.correct-btn:hover{
    background:#ff1e4d;
    transform:scale(1.1);
}

.maybe-btn{
    background:#cccccc;
    color:black;
}

.maybe-btn:hover{
    background:#aaaaaa;
}

/* Popup */
.popup{
    display:none;
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
    color:#ffd6e0;
}

/* Next Button */
.next-btn{
    display:none;
    margin-top:25px;
    padding:12px 30px;
    border:none;
    border-radius:25px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.next-btn:hover{
    background:#ff1e4d;
    transform:scale(1.1);
}

/* ================= FLOATING HEARTS ================= */

.heart{
    position:absolute;
    bottom:-20px;
    width:12px;
    height:12px;
    background:red;
    transform: rotate(45deg);
    animation: floatUp 6s linear infinite;
    opacity:0.8;
}

.heart::before,
.heart::after{
    content:"";
    position:absolute;
    width:12px;
    height:12px;
    background:red;
    border-radius:50%;
}

.heart::before{ top:-6px; left:0; }
.heart::after{ left:-6px; top:0; }

@keyframes floatUp{
    0%{ transform:translateY(0) rotate(45deg); opacity:1; }
    100%{ transform:translateY(-100vh) rotate(45deg); opacity:0; }
}

/* ================= SPARKLES ================= */

.sparkle{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation:sparkleAnim 3s linear infinite;
}

@keyframes sparkleAnim{
    0%{ transform:translateY(0); opacity:1; }
    100%{ transform:translateY(-100vh); opacity:0; }
}

/* ================= ANIMATIONS ================= */

@keyframes heartbeat{
    0%{ transform:scale(1); }
    50%{ transform:scale(1.2); }
    100%{ transform:scale(1); }
}

@keyframes fadeIn{
    from{ opacity:0; transform:translateY(30px); }
    to{ opacity:1; transform:translateY(0); }
}

/* Footer */
.footer{
    position:absolute;
    bottom:15px;
    width:100%;
    text-align:center;
    color:white;
    font-size:14px;
    z-index:2;
}.lights{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 50px 50px;
    animation: moveLights 20s linear infinite;
    opacity:0.3;
}

@keyframes moveLights{
    from{ background-position:0 0; }
    to{ background-position:1000px 1000px; }
}

</style>
</head>

<body>
<div class="lights"></div>
<div class="container">
    <div class="glass-box">

        <div class="corner-heart">🤍</div>

        <h1 class="book-title">Tell Me Something… 💭</h1>

        <p class="romantic-text">
            Will you ever leave me?
        </p>

        <div class="fun-buttons">

            <button class="correct-btn" onclick="correctLeave()">
                Never 💖
            </button>

            <button class="maybe-btn" onclick="wrongLeave()">
                Maybe 😅
            </button>

        </div>

        <div class="popup" id="leavePopup"></div>

        <button class="next-btn" id="leaveNext" onclick="goPage8()">
            Turn the Page ➜
        </button>

    </div>
</div>

<footer class="footer">
    Made with love 🤍
</footer>

<script>

/* Correct Answer */
function correctLeave(){
    document.getElementById("leavePopup").style.display="block";
    document.getElementById("leavePopup").innerText="I knew it 💖";
    document.getElementById("leaveNext").style.display="inline-block";
}

/* Wrong Answer */
function wrongLeave(){
    document.getElementById("leavePopup").style.display="block";
    document.getElementById("leavePopup").innerText="Try again, my love 😌";
}

/* Go to Page 8 */
function goPage8(){
    window.location.href="page8.html";
}

/* Floating Hearts */
function createHearts(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.style.left=Math.random()*window.innerWidth+"px";
    heart.style.animationDuration=(4+Math.random()*4)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>{heart.remove();},6000);
}
setInterval(createHearts,400);

/* Sparkles */
function createSparkle(){
    const sparkle=document.createElement("div");
    sparkle.classList.add("sparkle");
    sparkle.style.left=Math.random()*window.innerWidth+"px";
    sparkle.style.animationDuration=(2+Math.random()*3)+"s";
    document.body.appendChild(sparkle);
    setTimeout(()=>{sparkle.remove();},3000);
}
setInterval(createSparkle,200);

</script>

</body>
</html>
